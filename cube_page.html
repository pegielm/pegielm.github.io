<!DOCTYPE html>
<html>
<head>
	<title>3D Cube Animation</title>
	<style>
		.container {
			width: 200px;
			height: 200px;
			position: relative;
			transform-style: preserve-3d;
			animation: rotate 5s linear infinite;
            display: flex;
			justify-content: center;
			align-items: center;
		}

		.cube {
			width: 100%;
			height: 100%;
			position: absolute;
			transform-style: preserve-3d;
		}

		.cube div {
			width: 200px;
			height: 200px;
			position: absolute;
			text-align: center;
			font-size: 50px;
			font-weight: bold;
			color: white;
			background-color: rgba(0, 0, 0, 0.8);
			box-shadow: inset 0 0 50px rgba(10,0,0, 1);
		}

		.cube .front {
			transform: translateZ(100px);
		}

		.cube .back {
			transform: rotateY(180deg) translateZ(100px);
		}

		.cube .top {
			transform: rotateX(90deg) translateZ(100px);
		}

		.cube .bottom {
			transform: rotateX(-90deg) translateZ(100px);
		}

		.cube .left {
			transform: rotateY(-90deg) translateZ(100px);
		}

		.cube .right {
			transform: rotateY(90deg) translateZ(100px);
		}

		@keyframes rotate {
			0% {
				transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
			}
			100% {
				transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="cube">
			<div class="front">pegielm</div>
			<div class="back">pegielm</div>
			<div class="top">pegielm</div>
			<div class="bottom">pegielm</div>
			<div class="left">pegielm</div>
			<div class="right">pegielm</div>
		</div>
	</div>
</body>
</html>
